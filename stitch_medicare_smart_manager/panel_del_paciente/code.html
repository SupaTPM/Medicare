<script>
        // Simple micro-interaction for the QR button
        const qrBtn = document.querySelector('button[data-icon="qr_code_2"]');
        if(qrBtn) {
            qrBtn.addEventListener('click', () => {
                const icon = qrBtn.querySelector('.material-symbols-outlined');
                icon.style.transform = 'rotate(360deg)';
                icon.style.transition = 'transform 0.5s ease-in-out';
                setTimeout(() => icon.style.transform = 'rotate(0deg)', 500);
            });
        }

        // Ripple-like effect for bento cards
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('click', function(e) {
                let x = e.clientX - e.target.offsetLeft;
                let y = e.clientY - e.target.offsetTop;
                let ripples = document.createElement('span');
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                // (Visual only feedback, non-essential)
            });
        });
    </script>
